          class="md:hidden text-gray-600 focus:outline-none"
          id="mobileMenuButton"

      </div>

      <div class="md:hidden hidden bg-white py-2 shadow-lg" id="mobileMenu">
        <a href="index.html" class="block py-2 px-6 hover:bg-gray-100">Home</a>
        <a href="about.html" class="block py-2 px-6 hover:bg-gray-100">About</a>

        <a href="contact.html" class="block py-2 px-6 hover:bg-gray-100"
          >Contact</a
        >
      </div>
    </nav>

    <!-- Contact Header -->
    <section class="pt-24 pb-16 md:pt-32 md:pb-24 hero-gradient text-white">
      <div class="container mx-auto px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 fade-in">
          Get In Touch
        </h1>
        <p class="max-w-2xl mx-auto text-lg mb-10 fade-in">
          Have a project in mind or want to collaborate? I'd love to hear from
          you.
        </p>
      </div>
    </section>

    <!-- Contact Section -->
    <section class="py-16 bg-gray-100">
      <div class="container mx-auto px-6">
        <div class="max-w-4xl mx-auto">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Contact Info -->
            <div class="lg:col-span-1 space-y-6 fade-in">
              <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-green-600 text-2xl mb-4">
                  <i class="fas fa-map-marker-alt"></i>
                </div>
                <h3 class="text-lg font-bold mb-2">Location</h3>
                <p class="text-gray-600">Turkana, Kenya</p>
              </div>
              <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-green-600 text-2xl mb-4">
                  <i class="fas fa-envelope"></i>
                </div>
                <h3 class="text-lg font-bold mb-2">Email</h3>
                <p class="text-gray-600">ngangaharrison490@gmail.com</p>
              </div>
              <div class="bg-white rounded-lg shadow-md p-6 text-center">
                <div class="text-green-600 text-2xl mb-4">
                  <i class="fas fa-phone"></i>
                </div>
                <h3 class="text-lg font-bold mb-2">Phone</h3>
                <p class="text-gray-600">+254768883913</p>
              </div>
            </div>

            <!-- Contact Form -->
            <div class="lg:col-span-2 fade-in">
              <div class="bg-white rounded-lg shadow-md p-8">
                <form
                  action="https://formspree.io/f/mnnooybn"
                  method="POST"
                  id="contactForm"
                >
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                      <label for="name" class="block text-gray-700 mb-2"
                        >Your Name *</label
                      >
                      <input
                        type="text"
                        id="name"
                        name="name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                        required
                      />
                    </div>
                    <div>
                      <label for="email" class="block text-gray-700 mb-2"
                        >Your Email *</label
                      >
                      <input
                        type="email"
                        id="email"
                        name="email"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                        required
                      />
                    </div>
                  </div>
                  <div class="mb-6">
                    <label for="subject" class="block text-gray-700 mb-2"
                      >Subject *</label
                    >
                    <input
                      type="text"
                      id="subject"
                      name="subject"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                      required
                    />
                  </div>
                  <div class="mb-6">
                    <label for="message" class="block text-gray-700 mb-2"
                      >Your Message *</label
                    >
                    <textarea
                      id="message"
                      name="message"
                      rows="5"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                      required
                    ></textarea>
                  </div>
                  <button
                    type="submit"
                    class="bg-green-700 text-white px-8 py-3 rounded-lg font-semibold hover:bg-green-500 transition duration-300 w-full"
                  >
                    Send Message
                  </button>

                  <!-- Form Messages -->
                  <div id="formMessage" class="form-message mt-4"></div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
      <div class="container mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-center">
          <div class="mb-4 md:mb-0">
            <script>
              document.write(new Date().getFullYear());
            </script>
            <p>&copy; Harrison. All rights reserved.</p>
          </div>
          <div class="flex space-x-6">
            <a
              href="https://www.linkedin.com/in/harrison-ng-ang-a-91171a259/"
              class="text-gray-300 hover:text-white transition duration-300"
            >
              <i class="fab fa-linkedin text-xl"></i>
            </a>
            <a
              href="https://github.com/Harrisonnganga"
              class="text-gray-300 hover:text-white transition duration-300"
            >
              <i class="fab fa-github text-xl"></i>
            </a>
            <a
              href="https://instagram.com/nganga2363?igshid=NTc4MTIwNjQ2YQ=="
              class="text-gray-300 hover:text-white transition duration-300"
            >
              <i class="fab fa-instagram text-xl"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>
